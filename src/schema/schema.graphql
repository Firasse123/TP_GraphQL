type Query{
    hello:String!
    getAllCvs:[Cv!]!
    getCvById(id:ID!):Cv
    getAllUsers:[User!]
    getUserById(id:ID!):User
    getAllSkills:[Skill!]
    getSkillById(id:ID!):Skill
}
enum  EnumRoles{
    ADMIN
    USER
}
type User{
    id:ID!
    name:String!
    email:String!
    role:EnumRoles!
    cvs:[Cv!]
}

type Skill{
    id:ID!
    designation:String!
    cvs:[Cv!]
}

type Cv{
    id:ID!
    name:String!
    age:Int!
    job:String!
    user:User!
    skills:[Skill!]
}
type Mutation{
    CreateCv(input:CvCreateInput!):Cv
    UpdateCv(id:ID!,input:CvUpdateInput!):Cv
    DeleteCv(id:ID!):Cv
}

type Subscription{
    cvEvent: CvEvent!
}

type CvEvent{
    cv:Cv!
    mutationType:MutationType!
}

enum MutationType{
    CREATED
    UPDATED
    DELETED
}

input CvCreateInput{
    name:String!
    age:Int!
    job:String!
    userId:ID!
    skillsIds:[ID!]
}

input CvUpdateInput{
    name:String
    age:Int
    job:String
    userId:ID
    skillsIds:[ID!]
}
